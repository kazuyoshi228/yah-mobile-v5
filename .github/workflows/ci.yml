name: CI

# テストのみ自動実行。デプロイは含めない（本番反映は手動のまま）。
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ── 中核テスト（外部依存なし・毎回のゲート）──────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Firestore エミュレータ（Rulesテスト）用
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install root deps (pnpm)
        # ローカルは pnpm 9.15.9（node-lts）でロック更新、CIは packageManager の 10.4.1。
        # patchedDependencies の表現差で frozen が拒否されるため no-frozen で整合させる。
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Client tests (vitest)
        run: pnpm run test:client

      - name: Install functions deps (npm)
        working-directory: functions
        run: npm ci

      - name: Functions build & test
        working-directory: functions
        run: npm run build && npm test

      - name: Install firebase-tools
        run: npm i -g firebase-tools

      - name: Rules tests (Firestore emulator)
        run: pnpm run test:rules

  # ── E2E（既定オフ。Repo variable RUN_E2E=true ＋ 下記 secrets 設定で有効化）──
  # 現状は本番 Firebase を読むため secrets が必要。将来のエミュE2E移行で本番非依存化予定。
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ vars.RUN_E2E == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root deps (pnpm)
        # ローカルは pnpm 9.15.9（node-lts）でロック更新、CIは packageManager の 10.4.1。
        # patchedDependencies の表現差で frozen が拒否されるため no-frozen で整合させる。
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Create .env (public web config from secrets)
        run: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY=${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          VITE_ANALYTICS_ENDPOINT=${{ secrets.VITE_ANALYTICS_ENDPOINT }}
          VITE_ANALYTICS_WEBSITE_ID=${{ secrets.VITE_ANALYTICS_WEBSITE_ID }}
          EOF

      - name: E2E (Playwright)
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
